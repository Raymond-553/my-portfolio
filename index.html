<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

    // 🔁 Your real Firebase config (from Firebase Console)
    const firebaseConfig = {
        apiKey: "AIzaSyCFpTZyULAwlyZdUpdT-4cK7_sY3U0yiWk",
        authDomain: "portfolio-messages-56241.firebaseapp.com",
        projectId: "portfolio-messages-56241",
        storageBucket: "portfolio-messages-56241.firebasestorage.app",
        messagingSenderId: "115427367526",
        appId: "1:115427367526:web:6fe2f8a78f8bb90bf5eba7",
        measurementId: "G-E5GLVXWLR5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const form = document.getElementById('contact-form');
    const statusDiv = document.getElementById('form-status');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const message = document.getElementById('message').value;

        try {
            await addDoc(collection(db, "messages"), {
                name: name,
                email: email,
                message: message,
                timestamp: new Date()
            });
            statusDiv.innerHTML = "✅ Message sent successfully!";
            form.reset();
        } catch (error) {
            console.error("Error adding document: ", error);
            statusDiv.innerHTML = "❌ Failed to send. Please try again.";
        }
    });
</script>
